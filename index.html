<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Consulta Inbox Pro</title>
    <!-- Assets -->
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- Local Styles -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="wrap">
        <div class="header">
            <h1>Consulta <em>Inbox</em></h1>
        </div>

        <!-- Intelligence Configuration -->
        <div id="config-banner" style="display:none">
            <p><strong>Configuración de Inteligencia</strong><br>Origen: <strong id="showOrigin"></strong></p>
            
            <label class="config-label">Google OAuth Client ID</label>
            <input type="text" id="clientIdInput" placeholder="XXXXXXXXXXXX.apps.googleusercontent.com">
            
            <div class="config-actions">
                <button class="btn-save" onclick="saveConfigs()">Guardar Todo</button>
                <button class="btn-clear" onclick="clearConfigs()">Borrar</button>
            </div>
        </div>

        <div id="main-search-card">
            <!-- Search Form (Main focus) -->
            <div class="card" id="search-card">
                <form id="searchForm" onsubmit="event.preventDefault(); searchMails();">
                    <div class="field">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <label for="filterEmail">Filtrar por remitente o contenido</label>
                            <div style="display:flex; align-items:center; gap:8px;">
                                <label style="font-size:0.6rem; color:var(--text-dim);">MAX:</label>
                                <input type="number" id="maxResultsInput" value="10" min="1" max="100" style="width:45px; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:0.75rem; text-align:center; padding:2px;">
                            </div>
                        </div>
                        <div class="input-row">
                            <input type="email" id="filterEmail" required placeholder="ejemplo@remitente.com"
                                onkeyup="this.value=this.value.replace(/\s/g,'')"
                                ondblclick="this.value='';this.focus();">
                            <span class="paste-btn" title="Pegar" onclick="pasteFromClipboard()">📋</span>
                        </div>
                    </div>
                    <button type="submit" class="btn-submit" id="submitBtn">Buscar Correos</button>
                </form>
            </div>

            <!-- Authentication Area (Floating Icon) -->
            <div id="authCard">
                <div class="auth-status" id="authStatus">
                    Desconectado
                    <button class="auth-config-link" id="authConfigBtn" onclick="event.stopPropagation(); toggleConfig()">Configurar OAuth</button>
                </div>
                <button id="authBtn" onclick="startAuth()" title="Conectar con Google">
                    <svg viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" />
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Status Indicator -->
        <div id="loader">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <!-- Dynamic Results -->
        <h2 style="font-size:0.9rem; font-weight:700; color:var(--text-dim); margin-bottom:15px; display:flex; align-items:center;">
            RESULTADOS 
            <span id="liveStatus" class="live-badge" style="display:none; font-size: 0.61rem; color: var(--green); border: 1px solid var(--green); padding: 1px 6px; border-radius: 12px; margin-left:10px; animation: blink 1s infinite;">LIVE</span>
        </h2>
        
        <style>
            @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
            @keyframes deckFall {
                0% { transform: translateY(-40px) scale(0.95); opacity: 0; }
                100% { transform: translateY(0) scale(1); opacity: 1; }
            }
            .email-item { animation: deckFall 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        </style>
        <div id="resultsContainer"></div>
    </div>

    <!-- Notification Overlay -->
    <div id="toast"></div>

    <!-- Local Logic -->
    <script src="script.js" defer></script>
</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Consulta Inbox Pro</title>
    <!-- Assets -->
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
    <!-- Local Styles -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="wrap">
        <div class="header">
            <h1>Consulta <em>Inbox</em></h1>
            <button id="configLogoutBtn" class="session-btn" type="button">Cerrar sesión</button>
        </div>

        <div id="main-search-card">
            <!-- Search Form (Main focus) -->
            <div class="card" id="search-card">
                <form id="searchForm" onsubmit="event.preventDefault(); searchMails();">
                    <div class="field">
                        <label for="filterEmail">Filtrar por remitente</label>
                        <div class="input-row">
                            <input type="text" id="filterEmail" placeholder="ejemplo@remitente.com"
                                onkeyup="this.value=this.value.replace(/\s/g,'')"
                                ondblclick="this.value='';this.focus();">
                            <span id="clearFilterBtn" class="clear-btn" title="Limpiar" onclick="clearFilterInput()">×</span>
                            <span class="paste-btn" title="Pegar" onclick="pasteFromClipboard()">
                                <svg viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M9 4h6a1 1 0 0 1 1 1v2H8V5a1 1 0 0 1 1-1z" fill="currentColor"/>
                                    <rect x="6" y="7" width="12" height="13" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="2.8"/>
                                    <path d="M10 11h4M10 14h4" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                                </svg>
                            </span>
                        </div>
                    </div>
                    <button type="submit" class="btn-submit" id="submitBtn">Buscar Correos</button>
                </form>
            </div>
        </div>

        <!-- Status Indicator -->
        <div id="loader">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <!-- Dynamic Results -->
        <div class="results-head">
            <h2 style="font-size:0.9rem; font-weight:700; color:var(--text-dim); margin-bottom:0; display:flex; align-items:center;">
                RESULTADOS 
                <span id="liveStatus" class="live-dot" style="display:none; width:8px; height:8px; border-radius:50%; background:var(--green); margin-left:10px;"></span>
                <span id="resultsMaxInfo" style="margin-left:10px; font-size:0.66rem; color:var(--text-muted); font-weight:600;">MAX: 10</span>
            </h2>
            <div class="max-control max-control-results">
                <label for="maxResultsInput" class="max-label">MAX</label>
                <input type="number" id="maxResultsInput" value="10" min="1" max="100">
            </div>
        </div>
        
        <div id="resultsContainer"></div>
    </div>

    <button id="backToTopBtn" class="back-to-top" title="Volver al inicio" aria-label="Volver al inicio">
        <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 14l6-6 6 6" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </button>

    <!-- Notification Overlay -->
    <div id="toast"></div>

    <div id="configLoginModal" class="config-modal" aria-hidden="true">
        <div class="config-modal-card">
            <h3>Inicio de sesión</h3>
            <p>Ingresa tu contraseña para acceder.</p>
            <form id="configLoginForm">
                <div class="field">
                    <label for="configPasswordInput">Contraseña</label>
                    <input type="password" id="configPasswordInput" placeholder="Ingresa tu contraseña" required>
                </div>
                <button type="submit" class="btn-submit config-login-btn">Entrar</button>
            </form>
        </div>
    </div>

    <!-- Local Logic -->
    <script src="script.js" defer></script>
</body>

</html>

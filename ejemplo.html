<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta tu código de acceso único</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1301/1301085.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0e1012;
            --surface: #161819;
            --surface2: #0b0d0e;
            --border: #1e2225;
            --border2: #252a2d;
            --green: #3d9e68;
            --green-dim: #2a6e49;
            --green-glow: rgba(61, 158, 104, 0.12);
            --text: #d8dce6;
            --text-dim: #5a6270;
            --text-muted: #3a4050;
            --red-bg: #1a0f0f;
            --red-border: #3a1f1f;
            --success-bg: #0e1a12;
            --success-border: #1e3228;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 16px 12px 12px;
        }

        .wrap {
            width: 100%;
            max-width: 260px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Header */
        .header {
            text-align: center;
            padding-bottom: 2px;
        }

        .header h1 {
            font-size: 1.15rem;
            font-weight: 600;
            color: #c8cdd8;
            letter-spacing: -0.02em;
        }

        .header h1 em {
            font-style: normal;
            color: var(--green);
        }

        /* Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
        }

        /* Form */
        .field label {
            display: block;
            font-size: 0.66rem;
            font-weight: 500;
            color: var(--text-dim);
            letter-spacing: 0.07em;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .input-row {
            position: relative;
            display: flex;
            align-items: center;
        }

        input[type="email"] {
            width: 100%;
            padding: 8px 50px 8px 9px;
            font-size: 0.78rem;
            font-family: 'DM Sans', sans-serif;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            outline: none;
            transition: border-color 0.18s, box-shadow 0.18s;
        }

        input[type="email"]::placeholder {
            color: var(--text-muted);
        }

        input[type="email"]:focus {
            border-color: var(--green-dim);
            box-shadow: 0 0 0 2px var(--green-glow);
        }

        .input-actions {
            position: absolute;
            right: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .paste-btn,
        .clear-btn {
            cursor: pointer;
            color: var(--text-muted);
            transition: color 0.15s;
            line-height: 1;
            user-select: none;
        }

        .paste-btn {
            font-size: 1.05rem;
        }

        .paste-btn:hover {
            color: var(--green);
        }

        .clear-btn {
            font-size: 0.72rem;
            font-weight: 500;
        }

        .clear-btn:hover {
            color: #a04040;
        }

        /* Submit */
        .btn-submit {
            width: 100%;
            margin-top: 10px;
            padding: 9px;
            font-size: 0.83rem;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            color: #c8e8d4;
            background: #1a5c38;
            border: 1px solid #257a4a;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.18s, box-shadow 0.18s, transform 0.12s;
            letter-spacing: 0.01em;
        }

        .btn-submit:hover {
            background: #1f6b40;
            box-shadow: 0 3px 14px rgba(26, 92, 56, 0.45);
            transform: translateY(-1px);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        /* Result card */
        #codeContainer {
            display: none;
            animation: fadeUp 0.28s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #codeContainer .about {
            font-size: 0.8rem;
            font-weight: 500;
            color: #b8bec8;
            text-align: center;
            margin-bottom: 3px;
            line-height: 1.35;
        }

        #codeContainer .time-ago {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-align: center;
            margin-bottom: 10px;
        }

        #codeValue {
            font-family: 'DM Mono', monospace;
            font-size: 1.85rem;
            font-weight: 500;
            color: var(--green);
            letter-spacing: 0.1em;
            text-align: center;
            margin-bottom: 10px;
        }

        #codeValue[hidden] {
            display: none !important;
        }

        .result-actions {
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .btn-copy,
        .btn-link {
            padding: 6px 14px;
            font-size: 0.75rem;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            color: #b8d8c0;
            background: #132a1e;
            border: 1px solid #1e3d2a;
            border-radius: 7px;
            cursor: pointer;
            transition: background 0.15s, transform 0.12s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-copy[hidden],
        .btn-link[hidden] {
            display: none !important;
        }

        .btn-copy:hover,
        .btn-link:hover {
            background: #183524;
            transform: translateY(-1px);
        }

        /* Loader */
        #loader {
            display: none;
            justify-content: center;
            padding: 4px 0;
            gap: 6px;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--green-dim);
            animation: bop 1.2s infinite ease-in-out;
        }

        .dot:nth-child(2) {
            animation-delay: 0.18s;
            background: #3a8e5c;
        }

        .dot:nth-child(3) {
            animation-delay: 0.36s;
            background: var(--green);
        }

        @keyframes bop {

            0%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-10px);
            }
        }

        /* ── Notificaciones tipo pill flotante ── */
        #notif-bar {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%) translateY(8px);
            z-index: 999;
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 7px 13px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.22s, transform 0.22s;
            max-width: calc(100vw - 32px);
            white-space: normal;
            text-align: center;
        }

        #notif-bar.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        #notif-bar.error {
            background: #1e0f0f;
            border: 1px solid #3d2020;
            color: #d49090;
        }

        #notif-bar.success {
            background: #0e1c13;
            border: 1px solid #1e3828;
            color: #80c898;
        }

        #notif-bar .notif-icon {
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: #1e2225;
            border-radius: 2px;
        }
    </style>
</head>

<body>

    <div class="wrap">

        <div class="card">
            <form id="contactForm" onsubmit="event.preventDefault(); consultarCodigo();">
                <input type="hidden" id="whatsapp" value="bbb4b7f9-4e4a-4a68-a585-319e16726418">

                <div class="field">
                    <label for="email">Correo electrónico</label>
                    <div class="input-row">
                        <input type="email" id="email" required placeholder="ejemplo@correo.com"
                            onkeyup="this.value=this.value.replace(/\s/g,'')" ondblclick="this.value='';this.focus();">
                        <div class="input-actions">
                            <span class="paste-btn" title="Pegar" onclick="pegarDesdePortapapeles()">📋</span>
                            <span class="clear-btn" title="Limpiar"
                                onclick="document.getElementById('email').value='';document.getElementById('email').focus()">✕</span>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">Consultar código</button>
            </form>
        </div>

        <div id="loader">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <div class="card" id="codeContainer">
            <div class="about" id="codeAbout"></div>
            <div class="time-ago" id="estimatedTimeAgo"></div>
            <div id="codeValue" hidden></div>
            <div class="result-actions">
                <button class="btn-copy" id="btnCopiar" hidden onclick="copiarCodigo()">Copiar código</button>
                <a class="btn-link" id="btnEnlace" hidden target="_blank">Abrir enlace</a>
            </div>
        </div>
    </div>

    <!-- Notificación pill flotante -->
    <div id="notif-bar">
        <span class="notif-icon" id="notif-icon"></span>
        <span id="notif-text"></span>
    </div>

    <script>
        let submitBtn, notifTimer, toastTimer, currentController, currentTimeout;
        let isSearching = false;

        /* ── Notif pill ── */
        function showNotif(text, type = 'error', duration = 3500) {
            const bar = document.getElementById('notif-bar');
            const icon = document.getElementById('notif-icon');
            const txt = document.getElementById('notif-text');
            clearTimeout(notifTimer);
            icon.textContent = type === 'success' ? '✓' : '✕';
            txt.textContent = text;
            bar.className = `show ${type}`;
            if (duration > 0) {
                notifTimer = setTimeout(() => { bar.className = type; }, duration);
            }
        }

        function hideNotif() {
            const bar = document.getElementById('notif-bar');
            bar.className = bar.className.replace('show', '').trim();
        }

        /* ── Loading ── */
        function setLoading(on) {
            isSearching = on;
            document.getElementById('loader').style.display = on ? 'flex' : 'none';
            if (submitBtn) {
                submitBtn.textContent = on ? 'Cancelar' : 'Consultar código';
                submitBtn.style.background = on ? '#5c2222' : '#1a5c38';
                submitBtn.style.borderColor = on ? '#7a3030' : '#257a4a';
            }
        }

        function cancelSearch() {
            if (currentController) currentController.abort();
            if (currentTimeout) clearTimeout(currentTimeout);
            setLoading(false);
            showNotif('Consulta cancelada', 'error', 2500);
        }

        /* ── Pegar ── */
        function pegarDesdePortapapeles() {
            navigator.clipboard.readText()
                .then(text => {
                    const clean = text.trim().replace(/\s/g, '');
                    if (/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(clean)) {
                        const el = document.getElementById('email');
                        el.value = clean; el.focus();
                        localStorage.setItem('email', clean);
                    } else {
                        showNotif('El texto copiado no es un correo válido', 'error');
                    }
                })
                .catch(() => showNotif('No se pudo acceder al portapapeles', 'error'));
        }

        /* ── Consulta principal ── */
        async function consultarCodigo() {
            if (isSearching) { cancelSearch(); return; }

            document.getElementById('codeContainer').style.display = 'none';
            hideNotif();
            setLoading(true);

            const email = document.getElementById('email').value;
            const contact = document.getElementById('whatsapp').value;

            currentController = new AbortController();
            currentTimeout = setTimeout(() => currentController.abort(), 15000);

            try {
                const res = await fetch(
                    'https://script.google.com/macros/s/AKfycbxxpFhWX0yUOxMpzEeM8j1VU-BJX174vdO2_dzdsbH_rH0j9aYrbNTMeaOc4tl2eysRaQ/exec',
                    { method: 'POST', body: JSON.stringify({ emailToCheck: email, contact }), signal: currentController.signal }
                );
                clearTimeout(currentTimeout);
                const data = await res.json();
                setLoading(false);

                if (data.noError) {
                    document.getElementById('codeAbout').textContent = data.about;
                    document.getElementById('estimatedTimeAgo').textContent = data.estimatedTimeAgo;

                    const valEl = document.getElementById('codeValue');
                    const copBtn = document.getElementById('btnCopiar');
                    const lnkBtn = document.getElementById('btnEnlace');

                    if (data.code) {
                        valEl.textContent = data.code; valEl.hidden = false;
                        copBtn.hidden = false; lnkBtn.hidden = true;
                    } else if (data.link) {
                        valEl.hidden = true; copBtn.hidden = true;
                        lnkBtn.hidden = false; lnkBtn.href = data.link;
                    }

                    document.getElementById('codeContainer').style.display = 'block';
                    document.getElementById('codeContainer').scrollIntoView({ behavior: 'smooth', block: 'nearest' });

                    /* Auto-copiar si es reciente */
                    if (data.code) {
                        const t = (data.estimatedTimeAgo || '').toLowerCase();
                        const isFresh = t.includes('segundo') || t.includes('justo ahora') || t.includes('momento')
                            || (() => { const m = t.match(/(\d+)\s*min/); return m && parseInt(m[1]) < 15; })();
                        if (isFresh) {
                            navigator.clipboard.writeText(data.code)
                                .then(() => showNotif('Código copiado automáticamente', 'success'))
                                .catch(() => { });
                        }
                    }

                    fetch(`https://geo-ip-gydp.onrender.com?ts=${Date.now()}&email=${encodeURIComponent(email)}&contact=${data.contact}&noError=true&message=${encodeURIComponent(data.about)}&from=leiner&about=${encodeURIComponent(data.about)}&${data.code ? 'code=' + data.code : 'link=' + encodeURIComponent(data.link)}`)
                        .catch(() => { });
                } else {
                    showNotif(data.message || 'Ocurrió un error', 'error', 0);
                    fetch(`https://geo-ip-gydp.onrender.com?ts=${Date.now()}&email=${encodeURIComponent(email)}&contact=${data.contact}&noError=false&message=${encodeURIComponent(data.message || '')}&from=leiner&about=${encodeURIComponent(data.message || '')}`)
                        .catch(() => { });
                }
            } catch (err) {
                clearTimeout(currentTimeout);
                setLoading(false);
                if (err.name !== 'AbortError') showNotif('Ocurrió un error', 'error', 0);
                fetch(`https://geo-ip-gydp.onrender.com?ts=${Date.now()}&email=${encodeURIComponent(document.getElementById('email').value)}&contact=${document.getElementById('whatsapp').value}&noError=false&message=${encodeURIComponent(err.message)}&from=leiner&about=${encodeURIComponent(err.message)}`)
                    .catch(() => { });
            }
        }

        function copiarCodigo() {
            const code = document.getElementById('codeValue').textContent;
            navigator.clipboard.writeText(code)
                .then(() => showNotif('Código copiado', 'success'))
                .catch(() => showNotif('Error al copiar', 'error'));
        }

        document.addEventListener('DOMContentLoaded', () => {
            submitBtn = document.getElementById('submitBtn');
            const emailEl = document.getElementById('email');
            const saved = localStorage.getItem('email');
            if (saved) emailEl.value = saved;
            emailEl.addEventListener('change', () => localStorage.setItem('email', emailEl.value));
        });
    </script>
</body>

</html>
